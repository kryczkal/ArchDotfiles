# ──────────────────────────────────────────────────────────────
# GENERAL
# ──────────────────────────────────────────────────────────────
set -sg escape-time 10             # remove delay for nvim
set -g focus-events on             # let nvim react to focus
set -g mouse on                    # mouse support

# ──────────────────────────────────────────────────────────────
# TRUE COLOR & UNDERCURL
# ──────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'   # undercurl
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underline colors

# ──────────────────────────────────────────────────────────────
# VIM-TMUX SEAMLESS NAVIGATION (vim-tmux-navigator)
# ──────────────────────────────────────────────────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ──────────────────────────────────────────────────────────────
# PANE RESIZE (Alt + h/j/k/l)
# ──────────────────────────────────────────────────────────────
bind -n M-h resize-pane -L 2
bind -n M-j resize-pane -D 2
bind -n M-k resize-pane -U 2
bind -n M-l resize-pane -R 2

# ──────────────────────────────────────────────────────────────
# SPLITS (open in current directory)
# ──────────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ──────────────────────────────────────────────────────────────
# CLIPBOARD (system clipboard via OSC 52)
# ──────────────────────────────────────────────────────────────
set -g set-clipboard on
set -as terminal-features ",*:hyperlinks"

# ──────────────────────────────────────────────────────────────
# DISABLE AUTO-RENAME
# ──────────────────────────────────────────────────────────────
set-option -g allow-rename off
set-option -g automatic-rename off

# ──────────────────────────────────────────────────────────────
# VI MODE IN COPY MODE
# ──────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ──────────────────────────────────────────────────────────────
# THEME (cyberdream via catppuccin) — auto-bootstrap
# ──────────────────────────────────────────────────────────────
# Auto-install catppuccin + cyberdream theme if not present
if-shell '[ ! -d ~/.config/tmux/plugins/catppuccin/tmux ]' \
  'run-shell "git clone https://github.com/catppuccin/tmux.git ~/.config/tmux/plugins/catppuccin/tmux && \
    cp ~/.local/share/nvim/lazy/cyberdream.nvim/extras/tmux/cyberdream.conf \
       ~/.config/tmux/plugins/catppuccin/tmux/themes/catppuccin_cyberdream_tmux.conf 2>/dev/null; true"'

set -g @catppuccin_flavor "cyberdream"
set -g @catppuccin_status_background "none"

# Use blue accent instead of default mauve (purple)
set -g @catppuccin_window_current_number_color "#{@thm_blue}"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_blue}"
set -g @catppuccin_pane_border_style "fg=#{@thm_overlay_0}"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux
